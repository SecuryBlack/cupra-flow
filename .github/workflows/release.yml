name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $asset = "cupraflow-${{ matrix.target }}"
          $stage = "${asset}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\cupraflow.exe" "$stage\cupraflow.exe"
          Copy-Item "config\config.toml" "$stage\config.toml"
          Compress-Archive -Path "$stage\*" -DestinationPath "${asset}.zip"
          $hash = (Get-FileHash "${asset}.zip" -Algorithm SHA256).Hash.ToLower()
          "${hash}  ${asset}.zip" | Set-Content "${asset}.zip.sha256"
          "ASSET_PATH=${asset}.zip"          | Add-Content $env:GITHUB_ENV
          "CHECKSUM_PATH=${asset}.zip.sha256" | Add-Content $env:GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET_PATH }}
            ${{ env.CHECKSUM_PATH }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          fail_on_unmatched_files: true
